name: Consolidate CUE forks

on:
  workflow_dispatch:
    inputs:
      include_nickel:
        description: "Also checkout Fleet-to-Force/nickel"
        required: false
        default: "false"
      target_branch:
        description: "Optional branch name to commit manifest into this repo"
        required: false
        default: ""

permissions:
  contents: write
  actions: read

jobs:
  consolidate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout orchestration repo
        uses: actions/checkout@v4

      - name: Prepare workspace
        run: |
          mkdir -p consolidated/cue
          mkdir -p consolidated/meta

      - name: Checkout cue
        uses: actions/checkout@v4
        with:
          repository: Fleet-to-Force/cue
          path: consolidated/cue/cue

      - name: Checkout cuelang.org
        uses: actions/checkout@v4
        with:
          repository: Fleet-to-Force/cuelang.org
          path: consolidated/cue/cuelang.org

      - name: Checkout setup-cue
        uses: actions/checkout@v4
        with:
          repository: Fleet-to-Force/setup-cue
          path: consolidated/cue/setup-cue

      - name: Checkout contrib-tools
        uses: actions/checkout@v4
        with:
          repository: Fleet-to-Force/contrib-tools
          path: consolidated/cue/contrib-tools

      - name: Checkout libcue
        uses: actions/checkout@v4
        with:
          repository: Fleet-to-Force/libcue
          path: consolidated/cue/libcue

      - name: Checkout cue-py
        uses: actions/checkout@v4
        with:
          repository: Fleet-to-Force/cue-py
          path: consolidated/cue/cue-py

      - name: Optionally checkout nickel
        if: ${{ inputs.include_nickel == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: Fleet-to-Force/nickel
          path: consolidated/cue/nickel

      - name: Write manifest
        shell: bash
        run: |
          cat > consolidated/meta/manifest.json <<'JSON'
          {
            "owned_cue_forks_visible_to_app": [
              "Fleet-to-Force/cue",
              "Fleet-to-Force/cuelang.org",
              "Fleet-to-Force/setup-cue",
              "Fleet-to-Force/contrib-tools",
              "Fleet-to-Force/libcue",
              "Fleet-to-Force/cue-py"
            ],
            "not_visible_in_this_session": [
              "Fleet-to-Force/proposal",
              "Fleet-to-Force/cue-api-java"
            ],
            "optional": [
              "Fleet-to-Force/nickel"
            ]
          }
          JSON

          python - <<'PY'
          import json, os, subprocess, pathlib
          root = pathlib.Path('consolidated/cue')
          rows = []
          for repo in sorted(p for p in root.iterdir() if p.is_dir()):
              def git(*args):
                  return subprocess.check_output(['git', '-C', str(repo), *args], text=True).strip()
              rows.append({
                  'repo': f'Fleet-to-Force/{repo.name}',
                  'branch': git('rev-parse', '--abbrev-ref', 'HEAD'),
                  'commit': git('rev-parse', 'HEAD'),
              })
          pathlib.Path('consolidated/meta/repos.json').write_text(json.dumps(rows, indent=2) + '\n')
          pathlib.Path('consolidated/meta/repos.tsv').write_text(
              'repo\tbranch\tcommit\n' + ''.join(f"{r['repo']}\t{r['branch']}\t{r['commit']}\n" for r in rows)
          )
          PY

      - name: Archive consolidated workspace
        run: |
          tar -czf cue-forks-consolidated.tgz consolidated

      - name: Upload consolidated artifact
        uses: actions/upload-artifact@v4
        with:
          name: cue-forks-consolidated
          path: |
            cue-forks-consolidated.tgz
            consolidated/meta/manifest.json
            consolidated/meta/repos.json
            consolidated/meta/repos.tsv

      - name: Optionally commit manifest to branch
        if: ${{ inputs.target_branch != '' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${{ inputs.target_branch }}"
          mkdir -p manifests
          cp consolidated/meta/manifest.json manifests/cue-forks-manifest.json
          cp consolidated/meta/repos.json manifests/cue-forks-repos.json
          cp consolidated/meta/repos.tsv manifests/cue-forks-repos.tsv
          git add manifests/
          git commit -m "Update consolidated CUE forks manifest" || exit 0
          git push --force origin "${{ inputs.target_branch }}"
